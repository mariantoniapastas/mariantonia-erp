<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariantonia — RRHH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#F0F2F5;
  --surface:#FFFFFF;
  --surface2:#F7F8FA;
  --border:#DDE1E8;
  --border2:#B8C0CC;
  --text:#0F1D2E;
  --muted:#5A6475;
  --muted2:#9BA5B2;
  --navy:#0F2D52;
  --navy-light:#1A3F6F;
  --navy-bg:#EBF0F7;
  --accent:#0F2D52;
  --accent-bg:#EBF0F7;
  --red-bg:#FEF2F2;
  --green:#166534;
  --green-bg:#F0FDF4;
  --blue:#1D4ED8;
  --blue-bg:#EFF6FF;
  --red:#B91C1C;
  --red-bg:#FEF2F2;
  --orange:#B45309;
  --orange-bg:#FFFBEB;
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --display:'Barlow Condensed',sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.on{display:flex;flex-direction:column;}

/* ── HOME SCREEN ── */
#home{align-items:center;justify-content:center;background:var(--navy);}
.home-inner{width:100%;max-width:700px;padding:48px 24px;}
.home-logo{text-align:center;margin-bottom:48px;}
.home-logo-icon{font-size:40px;margin-bottom:10px;}
.home-logo-name{font-size:42px;font-weight:700;letter-spacing:.5px;color:#fff;font-family:var(--display);text-transform:uppercase;line-height:1;}
.home-logo-sub{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:3px;margin-top:6px;}
.home-date{font-size:11px;color:rgba(255,255,255,.3);font-family:var(--mono);margin-top:8px;}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.home-card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:24px 22px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(4px);
}
.home-card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);transform:translateY(-2px);}
.home-card.total{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);}
.home-card-icon{font-size:22px;margin-bottom:10px;}
.home-card-name{font-size:20px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;color:#fff;font-family:var(--display);text-transform:uppercase;}
.home-card-meta{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.5px;}
.home-card-total{font-size:14px;font-family:var(--mono);font-weight:600;color:rgba(255,255,255,.8);margin-top:10px;}
.home-card-arrow{font-size:16px;color:rgba(255,255,255,.3);transition:.15s;}
.home-card:hover .home-card-arrow{color:#fff;}
.home-card-badge{position:absolute;top:14px;right:14px;}
.home-mes-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:10px;color:rgba(255,255,255,.5);font-family:var(--mono);}

/* ── APP SCREEN (sucursal / total) ── */
#app{background:var(--bg);}
.topbar{
  background:var(--navy);
  border-bottom:1px solid var(--navy-light);
  padding:0 24px;
  display:flex;
  align-items:center;
  height:52px;
  gap:12px;
  position:sticky;top:0;z-index:30;
}
.topbar-back{cursor:pointer;color:rgba(255,255,255,.5);font-size:18px;transition:.12s;padding:4px;}
.topbar-back:hover{color:#fff;}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:.8px;flex:1;color:#fff;font-family:var(--display);text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-date{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--mono);}

/* TABS DENTRO DE APP */
.app-tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;
  gap:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.app-tabs::-webkit-scrollbar{display:none;}
.app-tab{
  padding:12px 16px;
  font-size:12px;
  font-weight:500;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:.12s;
}
.app-tab:hover{color:var(--navy);}
.app-tab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;}

/* TAB CONTENT */
.tab-content{display:none;padding:24px;}
.tab-content.on{display:block;animation:fi .15s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* ── ATOMS ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;}
.b-green{background:var(--green-bg);color:var(--green);}
.b-red{background:var(--red-bg);color:var(--red);}
.b-blue{background:var(--blue-bg);color:var(--blue);}
.b-orange{background:var(--orange-bg);color:var(--orange);}
.b-gray{background:#F5F4F2;color:var(--muted);}

.alert{padding:11px 15px;border-radius:8px;font-size:12px;border-left:3px solid;display:flex;gap:10px;margin-bottom:8px;}
.al-red{background:var(--red-bg);border-color:var(--red);color:#7F1D1D;}
.al-orange{background:var(--orange-bg);border-color:var(--orange);color:#78350F;}
.al-blue{background:var(--blue-bg);border-color:var(--blue);color:#1E3A8A;}
.al-green{background:var(--green-bg);border-color:var(--green);color:#14532D;}

.btn{font-family:var(--font);font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap;}
.btn-p{background:var(--navy);color:#fff;}.btn-p:hover{background:var(--navy-light);}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border);}.btn-s:hover{background:var(--bg);}
.btn-g{background:var(--green);color:#fff;}.btn-g:hover{background:#166534;}
.btn-sm{padding:4px 9px;font-size:11px;}

input,select,textarea{font-family:var(--font);font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
input[type=number]{font-family:var(--mono);}
.ec{font-family:var(--mono);font-size:12px;padding:4px 6px;border:1px solid transparent;border-radius:4px;background:transparent;transition:.12s;}
.ec:hover{border-color:var(--border2);}
.ec:focus{border-color:var(--blue);background:var(--surface);outline:none;}
.ec.ch{background:var(--blue-bg);border-color:#93C5FD;}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.tbl-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tbl-title{font-size:12px;font-weight:600;color:var(--navy);}
table{width:100%;border-collapse:collapse;}
th{padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
td.r,th.r{text-align:right;}
.mono{font-family:var(--mono);}
.fw6{font-weight:600;}
.section-t{font-size:16px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;font-family:var(--display);text-transform:uppercase;color:var(--navy);}
.label{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.flex{display:flex;align-items:center;gap:8px;}
.flex-b{display:flex;align-items:center;justify-content:space-between;}
.g-4{margin-bottom:4px;}.g-8{margin-bottom:8px;}.g-12{margin-bottom:12px;}.g-16{margin-bottom:16px;}.g-20{margin-bottom:20px;}.g-24{margin-bottom:24px;}
.text-muted{color:var(--muted);}
.text-accent{color:var(--navy);}
.text-green{color:var(--green);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-light{background:rgba(255,255,255,.15);}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}

.cards-row{display:grid;gap:12px;}
.c2{grid-template-columns:1fr 1fr;}
.c3{grid-template-columns:1fr 1fr 1fr;}
.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.card-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.card-val{font-size:20px;font-weight:700;letter-spacing:-.5px;font-family:var(--mono);}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-dark{background:var(--navy);border-color:var(--navy);}
.card-dark .card-lbl,.card-dark .card-sub{color:rgba(255,255,255,.45);}
.card-dark .card-val{color:#fff;}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:460px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.16);max-height:90vh;overflow-y:auto;}
.modal-t{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.form-group{margin-bottom:12px;}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* emp card en sucursal */
.emp-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:12px;
  overflow:hidden;
}
.emp-card-hdr{
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
  transition:.12s;
}
.emp-card-hdr:hover{background:var(--surface2);}
.emp-card-hdr.expanded{border-bottom:1px solid var(--border);}
.emp-avatar{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.emp-card-name{font-size:13px;font-weight:600;}
.emp-card-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.emp-card-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.emp-card-total{font-size:13px;font-family:var(--mono);font-weight:600;}
.emp-card-body{padding:16px 18px;display:none;}
.emp-card-body.open{display:block;}
.emp-chevron{color:var(--muted2);font-size:14px;transition:.2s;}
.emp-chevron.open{transform:rotate(180deg);}

/* pago bar */
.pago-bar{padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.pago-bar-nums{display:flex;gap:16px;flex:1;font-size:12px;}
.pago-bar-prog{flex:1;max-width:180px;}

/* recibo */
.rec-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600;padding:10px 0 6px;border-top:1px solid var(--border);margin-top:10px;}
.upload-drop{border:2px dashed var(--border);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:.15s;background:var(--surface2);}
.upload-drop:hover,.upload-drop.drag-over{border-color:var(--blue);background:var(--blue-bg);}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
/* money input */
.money-wrap{position:relative;display:flex;align-items:center;}
.money-wrap::before{content:'$';position:absolute;left:9px;font-family:var(--mono);font-size:12px;color:var(--muted);pointer-events:none;z-index:1;}
.money-wrap input{padding-left:20px;}
.money-wrap .ec{padding-left:16px;}
/* recibo tabs */
.tab-pills{display:flex;gap:6px;margin-bottom:18px;}
.tab-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:.12s;}
.tab-pill.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* info box */
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;}
.info-box-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}

/* collapse */
.collapse-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px;font-weight:600;transition:.12s;}
.collapse-trigger:hover{background:var(--surface2);}
.collapse-body{display:none;margin-bottom:8px;}
.collapse-body.open{display:block;}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     HOME SCREEN
════════════════════════════════════════════════ -->
<div class="screen on" id="home">
  <div class="home-inner">
    <div class="home-logo">
      
      <div class="home-logo-name">Mariantonia</div>
      <div class="home-logo-sub">Gestión de Personal</div>
      <div class="home-date" id="home-date"></div>
    </div>

    <div class="home-grid" id="home-grid">
      <!-- se renderiza con JS -->
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     APP SCREEN
════════════════════════════════════════════════ -->
<div class="screen" id="app">
  <div id="conn-bar" style="background:var(--navy);padding:3px 24px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08)" id="conn-bar"><span id="conn-status"></span><span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,.25)" id="last-sync"></span></div>
  <div class="topbar">
    <span class="topbar-back" onclick="volverHome()" title="Volver">←</span>
    <span class="topbar-title" id="app-title"></span>
    <div class="topbar-right"><button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15)" onclick="recargarDesdeSheets()" title="Recargar datos">↺</button>
      <span class="topbar-date" id="app-date"></span>
      <button class="btn btn-p btn-sm" onclick="abrirPago()">+ Pago</button>
      <button class="btn btn-s btn-sm" onclick="abrirNov()">+ Novedad</button>
    </div>
  </div>

  <div class="app-tabs" id="app-tabs"></div>

  <div id="app-tab-contents"></div>
</div>

<!-- ════════ MODALES ════════ -->
<div class="overlay" id="modal-pago">
  <div class="modal">
    <div class="modal-t">💳 Registrar pago</div>
    <div class="form-group"><label class="form-label">Empleado</label><select id="mp-emp" onchange="autofillPago()"></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Fecha</label><input type="date" id="mp-fecha"></div>

          <option value="semanal">Pago semanal</option>
          <option value="saldo">Saldo 1 al 5</option>

      <div class="form-group"><label class="form-label">Efectivo ($)</label><div class="money-wrap"><input type="number" id="mp-efec" placeholder="0"></div></div>

    <div class="form-group"><label class="form-label">Nota</label><input type="text" id="mp-nota" placeholder="Ej: semana del 8/3"></div>

      <button class="btn btn-s" onclick="cerrarModal('modal-pago')">Cancelar</button>
      <button class="btn btn-g" onclick="confirmarPago()">✓ Confirmar</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-nov">
  <div class="modal">
    <div class="modal-t">📋 Registrar novedad</div>
    <div class="form-group"><label class="form-label">Empleado</label><select id="mn-emp"></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Fecha</label><input type="date" id="mn-fecha"></div>
      <div class="form-group"><label class="form-label">Novedad</label>
        <select id="mn-tipo" onchange="toggleHoras()">
          <option value="falta">Falta injustificada</option>
          <option value="tarde">Llegada tarde</option>
          <option value="extra">Hora extra</option>
          <option value="feriado">Feriado trabajado</option>
          <option value="licencia">Licencia justificada</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="mn-horas-row"><label class="form-label">Horas</label><input type="number" id="mn-horas" placeholder="1" min="0.5" step="0.5"></div>
    <div class="form-group"><label class="form-label">Detalle</label><input type="text" id="mn-detalle" placeholder="Descripción opcional"></div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="cerrarModal('modal-nov')">Cancelar</button>
      <button class="btn btn-p" onclick="confirmarNov()">Registrar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// CONFIGURACIÓN — pegá tu URL de Apps Script aquí
// ══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxSodRG6oZUX8KAGC04Q5cCmbC2t-ru6GbgFaZouzbVzvhY_KNb5pI8EvFAMseaCR5WDg/exec'; // ← PEGAR URL AQUÍ (ver instructivo)

// ── CAPA DE ALMACENAMIENTO ──────────────────────────
// Si SCRIPT_URL está configurado → usa Google Sheets
// Si no → usa localStorage como fallback
const S = {
  get: (k, d) => {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; }
  },
  set: (k, v) => {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    if (SCRIPT_URL) syncToSheets(k, v); // también sincroniza a Sheets
  }
};

// Estado de conexión
let _sheetsOK = false;
let _pendingSync = {};
let _loadedFromSheets = false;

// JSONP: evita CORS completamente usando <script> tags
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout'));
    }, 12000);
    function cleanup() {
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timeout);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Script error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(script);
  });
}

async function cargarDesdeSheets() {
  if (!SCRIPT_URL) { _loadedFromSheets = true; return; }
  mostrarEstadoConexion('cargando');
  try {
    const data = await jsonp(SCRIPT_URL + '?action=getAll');
    if (data.error) throw new Error(data.error);
    if (data.emps?.length)    { EMPS    = data.emps;    localStorage.setItem('emps',    JSON.stringify(EMPS));    }
    if (data.pagos?.length)   { PAGOS   = data.pagos;   localStorage.setItem('pagos',   JSON.stringify(PAGOS));   }
    if (data.recibos?.length) { RECIBOS = data.recibos; localStorage.setItem('recibos', JSON.stringify(RECIBOS)); }
    if (data.vac)             { VAC     = data.vac;     localStorage.setItem('vac',     JSON.stringify(VAC));     }
    if (data.sac)             { SAC     = data.sac;     localStorage.setItem('sac',     JSON.stringify(SAC));     }
    _sheetsOK = true;
    _loadedFromSheets = true;
    mostrarEstadoConexion('ok');
    renderHome();
  } catch(e) {
    console.warn('Sheets no disponible, usando local:', e.message);
    _loadedFromSheets = true;
    mostrarEstadoConexion('error');
    renderHome();
  }
}

async function syncToSheets(key, value) {
  if (!SCRIPT_URL) return;
  const keysToSync = ['emps','pagos','recibos','vac','sac'];
  if (!keysToSync.includes(key)) return;
  try {
    const encoded = encodeURIComponent(JSON.stringify(value));
    await jsonp(SCRIPT_URL + '?action=set&key=' + key + '&value=' + encoded);
  } catch(e) {
    console.warn('Sync falló para', key, e.message);
  }
}

function mostrarEstadoConexion(estado) {
  const el = document.getElementById('conn-status');

    error:    ['🟡', 'Modo offline (solo local)', '#FCD34D'],
    noconfig: ['⚙️', 'Sin configurar — solo local', '#94A3B8'],

  el.innerHTML = `<span style="color:${color}">${icon}</span> <span style="font-size:10px;color:rgba(255,255,255,.5)">${txt}</span>`;

    <td class="mono">$ ${Math.round(total).toLocaleString('es-AR')}</td><td></td></tr>`;
  html+=`</table></body></html>`;
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${e.nombre.replace(/ /g,'_')}_${meses[mm]||mm}_${anio}.xls`;
  a.click(); URL.revokeObjectURL(url);
}

function renderLiquidacion(){
  const e=curEmp; if(!e) return '';
  const antig=e.antig||0;
  const sueldo=e.total;
  const diario=sueldo/30;
  // Indemnizacion: 1 mes por año trabajado (mínimo 1)
  const indemMeses=Math.max(1,antig);
  const indem=sueldo*indemMeses;
  // Preaviso: <5a=1mes, >=5a=2meses
  const preavMeses=antig<5?1:2;
  const preavis=sueldo*preavMeses;
  // SAC proporcional del semestre (aprox)
  const hoy=new Date();
  const inicioSem=hoy.getMonth()<6?new Date(hoy.getFullYear(),0,1):new Date(hoy.getFullYear(),6,1);
  const diasSem=Math.round((hoy-inicioSem)/(1000*60*60*24));
  const sacProp=Math.round(sueldo*0.5*(diasSem/181));
  // Vacaciones pendientes
  const vd=diasVacReales(e);
  const tom=(VAC[e.id]||{tomados:0}).tomados||0;
  const pend=Math.max(0,vd-tom);
  const vacPend=Math.round(diario*pend*1.12);
  const totalDespido=indem+preavis+sacProp+vacPend;
  const totalRenuncia=sacProp+vacPend; // sin indemnización ni preaviso
  return `<div class="alert al-orange g-16">⚠️ <div>Cálculo orientativo según LCT. Verificar con liquidador antes de ejecutar.</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
    <div class="tbl-wrap">
      <div class="tbl-hdr"><span class="tbl-title">🔴 Despido sin causa</span></div>
      <table>
        <tr><td class="fw6">Indemnización</td><td class="mono r">${fmt(indem)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${antig}a. × ${fmt(sueldo)}</td></tr>
        <tr><td class="fw6">Preaviso</td><td class="mono r">${fmt(preavis)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${preavMeses} mes${preavMeses>1?'es':''}</td></tr>
        <tr><td class="fw6">SAC proporcional</td><td class="mono r">${fmt(sacProp)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${diasSem} días del semestre</td></tr>
        <tr><td class="fw6">Vacaciones pendientes</td><td class="mono r">${fmt(vacPend)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${pend} días + plus 12%</td></tr>
        <tr style="background:var(--navy);color:#fff"><td class="fw6" style="color:#fff">TOTAL DESPIDO</td><td class="mono r fw6" style="color:#fff">${fmt(totalDespido)}</td></tr>
      </table>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-hdr"><span class="tbl-title">🟡 Renuncia voluntaria</span></div>
      <table>
        <tr><td class="fw6">SAC proporcional</td><td class="mono r">${fmt(sacProp)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${diasSem} días del semestre</td></tr>
        <tr><td class="fw6">Vacaciones pendientes</td><td class="mono r">${fmt(vacPend)}</td></tr>
        <tr style="font-size:11px;color:var(--muted)"><td colspan="2" style="padding-left:14px">${pend} días + plus 12%</td></tr>
        <tr style="background:var(--navy);color:#fff"><td class="fw6" style="color:#fff">TOTAL RENUNCIA</td><td class="mono r fw6" style="color:#fff">${fmt(totalRenuncia)}</td></tr>
      </table>
    </div>
  </div>`;
}

function guardarConfigEmp(){
  const e=curEmp; if(!e) return;
  const idx=EMPS.findIndex(x=>x.id===e.id); if(idx<0) return;
  EMPS[idx]={
    ...EMPS[idx],
    nombre:document.getElementById('ce-nombre').value,
    suc:document.getElementById('ce-suc').value,
    conv:document.getElementById('ce-conv').value,
    cat:document.getElementById('ce-cat').value,

function renderPagos(){
  const mes=mesActual();
  const emps=getEmps();
  let total=0;
  const rows=emps.map(e=>{
    const misPag=PAGOS.filter(p=>p.empId===e.id&&p.fecha.startsWith(mes));
    const pg=misPag.reduce((a,p)=>a+(p.transf||0)+(p.efec||0),0);
    total+=e.total;
    const flt=Math.max(0,e.total-pg);
    const p2=pct(pg,e.total);
    return`<tr>
      <td class="fw6">${e.nombre}</td>
      ${curContext==='Total'?`<td>${e.suc}</td>`:''}
      <td class="mono">${fmt(e.total)}</td>
      <td class="mono text-green">${fmt(pg)}</td>
      <td class="mono ${flt>0?'text-accent':'text-green'}">${fmt(flt)}</td>
      <td style="width:120px">
        <div class="prog"><div class="prog-fill" style="width:${p2}%;background:${p2>=100?'var(--green)':'var(--blue)'}"></div></div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${p2}%</div>
      </td>
      <td><button class="btn btn-p btn-sm" onclick="abrirPagoEmp(${e.id})">+ Pago</button></td>
    </tr>`;
  }).join('');
  const totPag=PAGOS.filter(p=>p.fecha.startsWith(mes)&&(curContext==='Total'||EMPS.find(e=>e.id===p.empId)?.suc===curContext)).reduce((a,p)=>a+(p.transf||0)+(p.efec||0),0);

  let histRows=PAGOS.filter(p=>{
    if(!p.fecha.startsWith(mes)) return false;
    if(curContext!=='Total'&&EMPS.find(e=>e.id===p.empId)?.suc!==curContext) return false;
    return true;
  }).slice().reverse().map(p=>{
    const e=EMPS.find(x=>x.id===p.empId);
    return`<tr>
      <td>${p.fecha}</td>
      <td class="fw6">${e?e.nombre:'?'}</td>
      ${curContext==='Total'?`<td>${e?e.suc:'?'}</td>`:''}
      <td><span class="badge b-blue">${p.tipo}</span></td>
      <td class="mono">${p.transf>0?fmt(p.transf):'—'}</td>
      <td class="mono">${p.efec>0?fmt(p.efec):'—'}</td>
      <td class="mono fw6">${fmt((p.transf||0)+(p.efec||0))}</td>
      <td class="text-muted">${p.nota||'—'}</td>
      <td><button class="btn btn-s btn-sm" onclick="elimPago(this)" style="color:var(--accent)">✕</button></td>
    </tr>`;
  }).join('');
  if(!histRows) histRows=`<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:12px">Sin pagos registrados este mes</td></tr>`;

  return`<div class="cards-row c3 g-20">
    <div class="card card-dark"><div class="card-lbl">Total a pagar</div><div class="card-val">${fmt(total)}</div><div class="card-sub">este mes</div></div>
    <div class="card"><div class="card-lbl">Ya pagado</div><div class="card-val text-green">${fmt(totPag)}</div><div class="card-sub">${pct(totPag,total)}%</div></div>
    <div class="card"><div class="card-lbl">Pendiente</div><div class="card-val text-accent">${fmt(Math.max(0,total-totPag))}</div><div class="card-sub">por pagar</div></div>
  </div>
  <div class="tbl-wrap g-16">
    <div class="tbl-hdr"><span class="tbl-title">Estado de pagos — ${new Date().toLocaleDateString('es-AR',{month:'long',year:'numeric'})}</span></div>
    <table>
      <tr><th>Empleado</th>${curContext==='Total'?'<th>Suc.</th>':''}<th>Total mes</th><th>Pagado</th><th>Falta</th><th>Progreso</th><th></th></tr>
      ${rows}
    </table>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Historial de pagos del mes</span></div>
    <table>
      <tr><th>Fecha</th><th>Empleado</th>${curContext==='Total'?'<th>Suc.</th>':''}<th>Tipo</th><th>Transf.</th><th>Efec.</th><th>Total</th><th>Nota</th><th></th></tr>
      ${histRows}
    </table>
  </div>`;
}

function switchRecPill(name,el){

  el.classList.add('on');
  ['ingresar','foto','historial','paritarias'].forEach(n=>{
    const d=document.getElementById('rec-'+n);

// Pre-fills básico de convenio al cambiar empleado
function recAutoconvenio(){
  const el=document.getElementById('rec-emp'); if(!el)return;
  const e=EMPS.find(x=>x.id==el.value); if(!e)return;
  const pari=PARI.find(p=>p.conv===e.conv && e.cat.includes(p.cat.split('/')[0].trim()));
  if(pari && document.getElementById('rh-basico')){
    const bEl=document.getElementById('rh-basico');
    if(!bEl.value) bEl.value=pari.basico;
  }
  calcRecibo();
}

function agregarItemExtra(){
  const list=document.getElementById('rec-extras-list'); if(!list)return;
  const idx=list.children.length;
  const div=document.createElement('div');
  div.className='form-row';
  div.style.marginBottom='6px';
  div.id='rec-extra-'+idx;
  div.innerHTML=`
    <div class="form-group" style="flex:2">
      <input type="text" id="rex-label-${idx}" placeholder="Descripción del ítem" oninput="calcRecibo()">
    </div>
    <div class="form-group" style="flex:1">
      <select id="rex-tipo-${idx}" onchange="calcRecibo()" style="width:100%">
        <option value="rem">Remunerativo</option>
        <option value="nr">No remunerativo</option>
        <option value="desc">Descuento</option>
      </select>
    </div>
    <div class="form-group money-wrap" style="flex:1">
      <input type="number" id="rex-val-${idx}" placeholder="0" oninput="calcRecibo()">
    </div>
    <div style="display:flex;align-items:center;padding-bottom:12px">
      <button class="btn btn-s btn-sm" style="color:var(--red)" onclick="this.closest('div.form-row').remove();calcRecibo()">✕</button>
    </div>`;
  list.appendChild(div);
}

function getExtras(){
  const list=document.getElementById('rec-extras-list'); if(!list)return{rem:0,nr:0,desc:0,items:[]};
  let rem=0,nr=0,desc=0,items=[];
  Array.from(list.children).forEach(row=>{
    const idx=row.id.replace('rec-extra-','');
    const label=(document.getElementById('rex-label-'+idx)||{}).value||'Extra';
    const tipo=(document.getElementById('rex-tipo-'+idx)||{}).value||'rem';
    const val=parseFloat((document.getElementById('rex-val-'+idx)||{}).value)||0;
    if(val){
      if(tipo==='rem') rem+=val;
      else if(tipo==='nr') nr+=val;
      else desc+=val;
      items.push({label,tipo,val});
    }
  });
  return{rem,nr,desc,items};
}

function getRecItems(){
  const v=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};
  const basico      = v('rh-basico');
  const antig       = v('rh-antig');
  const presentismo = v('rh-presentismo');
  const horasExtra  = v('rh-horas-extra');
  const vacSac      = v('rh-vac-sac');
  const otrosRem    = v('rh-otros-rem');
  const nrFijo      = v('rnr-fijo');
  const nrVar       = v('rnr-var');
  const nrOtros     = v('rnr-otros');

  const extras      = getExtras();
  const totalRem    = basico+antig+presentismo+horasExtra+vacSac+otrosRem+extras.rem;
  const totalNR     = nrFijo+nrVar+nrOtros+extras.nr;
  const brutoRem    = totalRem; // descuentos solo sobre remunerativos

  // Descuentos — auto si no se completaron manualmente
  const jub   = v('rd-jub')  || Math.round(brutoRem*0.11);
  const os    = v('rd-os')   || Math.round(brutoRem*0.03);
  const sind  = v('rd-sind') || Math.round(brutoRem*0.025);
  const otros = v('rd-otros');
  const totalDesc = jub+os+sind+otros;
  const neto  = totalRem+totalNR-totalDesc;
  return {basico,antig,presentismo,horasExtra,vacSac,otrosRem,nrFijo,nrVar,nrOtros,totalRem,totalNR,brutoRem,jub,os,sind,otros,totalDesc,neto};
}

function calcRecibo(){
  const el=document.getElementById('rec-emp'); if(!el)return;
  const e=EMPS.find(x=>x.id==el.value); if(!e)return;
  const res=document.getElementById('rec-resultado'); if(!res)return;
  const r=getRecItems();
  if(!r.brutoRem && !r.totalNR){
    res.innerHTML=`<div class="info-box" style="color:var(--muted);font-size:12px;padding:20px;text-align:center">Completá los datos del recibo para ver el cálculo.</div>`;
    return;
  }
  const acuerdo=e.total;
  const efecDar=Math.max(0,acuerdo-r.neto);
  const row=(label,val,cls='')=>`<div class="info-row ${cls}"><span>${label}</span><span class="mono">${fmt(val)}</span></div>`;
  const rowD=(label,val)=>`<div class="info-row"><span>${label}</span><span class="mono text-accent">− ${fmt(val)}</span></div>`;
  res.innerHTML=`
    <div class="tbl-wrap">
      <div class="tbl-hdr"><span class="tbl-title">${e.nombre} — ${document.getElementById('rec-mes')?.value||mesActual()}</span>${sitBadge(e.sit)}</div>
      <div style="padding:14px 16px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:6px">Haberes remunerativos</div>
        ${r.basico?row('Básico de convenio',r.basico):''}
        ${r.antig?row('Antigüedad',r.antig):''}
        ${r.presentismo?row('Presentismo',r.presentismo):''}
        ${r.horasExtra?row('Horas extra',r.horasExtra):''}
        ${r.vacSac?row('Vacaciones / SAC',r.vacSac):''}
        ${r.otrosRem?row('Otros remunerativos',r.otrosRem):''}
        ${(()=>{const ex=getExtras();return ex.items.filter(i=>i.tipo==='rem').map(i=>row(i.label,i.val)).join('');})()}
        ${row('Subtotal remunerativo',r.totalRem,'fw6')}

        ${r.totalNR?`<div style="margin-top:10px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:6px">No remunerativos</div>
        ${r.nrFijo?row('NR fijo',r.nrFijo):''}
        ${r.nrVar?row('NR variable',r.nrVar):''}
        ${r.nrOtros?row('Otros NR',r.nrOtros):''}
        ${(()=>{const ex=getExtras();return ex.items.filter(i=>i.tipo==='nr').map(i=>row(i.label,i.val)).join('');})()}
        ${row('Subtotal NR',r.totalNR,'fw6')}`:''}

        <div style="margin-top:10px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:6px">Descuentos</div>
        ${rowD('Jubilación (11%)',r.jub)}
        ${rowD('Obra social (3%)',r.os)}
        ${rowD('Sindicato (~2.5%)',r.sind)}
        ${r.otros?rowD('Otros descuentos',r.otros):''}
        ${(()=>{const ex=getExtras();return ex.items.filter(i=>i.tipo==='desc').map(i=>rowD(i.label,i.val)).join('');})()}
        ${row('Total descuentos',r.totalDesc,'fw6')}

        <div style="height:8px"></div>
        ${row('🟢 Neto recibo (transferencia)',r.neto,'fw6')}

        <div style="margin-top:12px;padding-top:12px;border-top:2px solid var(--border)">
          ${row('Total acuerdo con empleado',acuerdo,'')}
          <div class="info-row"><span>Cubierto por recibo</span><span class="mono text-green">− ${fmt(r.neto)}</span></div>
          <div class="info-row fw6" style="margin-top:6px;padding-top:8px;border-top:1px solid var(--border)">
            <span>💵 Efectivo a dar</span>
            <span class="mono" style="font-size:18px;color:var(--accent)">${fmt(efecDar)}</span>
          </div>
        </div>
      </div>
    </div>
    ${efecDar>0?`<div class="alert al-orange" style="margin-top:10px">💡 Transferís ${fmt(r.neto)} + das en efectivo ${fmt(efecDar)} = total ${fmt(r.neto+efecDar)}</div>`:`<div class="alert al-green" style="margin-top:10px">✅ El recibo cubre todo el acuerdo.</div>`}
  `;
}

function guardarRecibo(){
  const empEl=document.getElementById('rec-emp'); if(!empEl)return;
  const e=EMPS.find(x=>x.id==empEl.value); if(!e)return;
  const r=getRecItems();
  if(!r.brutoRem && !r.totalNR){alert('Ingresá al menos el básico del recibo');return;}
  const extras=getExtras();
  const rec={
    empId:e.id, mes:document.getElementById('rec-mes')?.value||mesActual(),
    basico:r.basico, antig:r.antig, presentismo:r.presentismo,
    horasExtra:r.horasExtra, vacSac:r.vacSac, otrosRem:r.otrosRem,
    nrFijo:r.nrFijo, nrVar:r.nrVar, nrOtros:r.nrOtros,
    totalRem:r.totalRem, totalNR:r.totalNR,
    jub:r.jub, os:r.os, sind:r.sind, otrosDesc:r.otros,
    totalDesc:r.totalDesc, neto:r.neto, acuerdo:e.total, ts:Date.now()
  };
  RECIBOS.push(rec);
  S.set('recibos',RECIBOS);
  // Limpiar form
  ['rh-basico','rh-antig','rh-presentismo','rh-horas-extra','rh-vac-sac','rh-otros-rem','rnr-fijo','rnr-var','rnr-otros','rd-jub','rd-os','rd-sind','rd-otros'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  calcRecibo();
  alert('Recibo guardado ✓');
}

let recFileData=null, recFileType=null;

function handleFileSelect(input){
  const file=input.files[0]; if(!file)return;
  processRecFile(file);
}
function handleFileDrop(e){
  e.preventDefault();
  document.getElementById('upload-area').classList.remove('drag-over');
  const file=e.dataTransfer.files[0]; if(!file)return;
  processRecFile(file);
}
function processRecFile(file){
  recFileType=file.type;
  const reader=new FileReader();
  reader.onload=ev=>{
    recFileData=ev.target.result.split(',')[1];
    const prev=document.getElementById('rec-preview');
    if(file.type.startsWith('image/')){
      prev.innerHTML=`<img src="${ev.target.result}" style="max-width:100%;max-height:220px;border-radius:6px;border:1px solid var(--border)">`;
    } else {
      prev.innerHTML=`<div style="padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px">📄 ${file.name}</div>`;
    }
    document.getElementById('upload-area').style.background='var(--green-bg)';
    document.getElementById('btn-leer-recibo').style.display='inline-flex';
  };
  reader.readAsDataURL(file);
}

async function leerReciboConIA(){
  const btn=document.getElementById('btn-leer-recibo');
  const resEl=document.getElementById('rec-foto-resultado');
  if(!recFileData){alert('Subí una imagen primero');return;}

  btn.textContent='⏳ Leyendo...';
  btn.disabled=true;
  resEl.innerHTML=`<div class="info-box" style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">Analizando el recibo con IA…</div>`;

  const empEl=document.getElementById('rec-foto-emp');
  const e=EMPS.find(x=>x.id==empEl.value);

  const prompt=`Sos un asistente contable argentino. Analizá este recibo de sueldo y extraé TODOS los ítems.
Respondé SOLO con un JSON válido, sin texto adicional, con esta estructura exacta:
{
  "basico": 0,
  "antig": 0,
  "presentismo": 0,
  "horasExtra": 0,
  "vacSac": 0,
  "otrosRem": 0,
  "nrFijo": 0,
  "nrVar": 0,
  "nrOtros": 0,
  "jub": 0,
  "os": 0,
  "sind": 0,
  "otrosDesc": 0,
  "notas": "descripción breve de ítems especiales encontrados"
}

- basico: sueldo básico de convenio
- antig: antigüedad
- presentismo: presentismo
- horasExtra: horas extra
- vacSac: vacaciones o SAC incluido en recibo

- os: descuento obra social
- sind: descuento sindical
- otrosDesc: otros descuentos
Todos los valores en números enteros (pesos). Si no aparece un ítem, poner 0.`;

  try {
    const isImg=recFileType&&recFileType.startsWith('image/');
    const mtype=isImg?recFileType:'image/jpeg';
    const msgContent=isImg
      ? [{type:'image',source:{type:'base64',media_type:mtype,data:recFileData}},{type:'text',text:prompt}]
      : [{type:'document',source:{type:'base64',media_type:'application/pdf',data:recFileData}},{type:'text',text:prompt}];

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',

        messages:[{role:'user',content:msgContent}]

    const data=await resp.json();

    const totalDesc=(parsed.jub||0)+(parsed.os||0)+(parsed.sind||0)+(parsed.otrosDesc||0);

function pasarDatosIA(parsed){

  Object.entries(map).forEach(([k,id])=>{
    const el=document.getElementById(id);
    if(el && parsed[k]) el.value=parsed[k];
  });
  // Copiar empleado y mes
  const fotoEmp=document.getElementById('rec-foto-emp');
  const fotoMes=document.getElementById('rec-foto-mes');
  if(fotoEmp) document.getElementById('rec-emp').value=fotoEmp.value;
  if(fotoMes && document.getElementById('rec-mes')) document.getElementById('rec-mes').value=fotoMes.value;
  // Ir a tab manual
  switchRecPill('ingresar', document.querySelector('.tab-pill'));
  document.querySelectorAll('.tab-pill').forEach((p,i)=>{if(i===0)p.classList.add('on');else p.classList.remove('on');});
  calcRecibo();
  alert('Datos cargados en el formulario. Revisalos y guardá.');
}
